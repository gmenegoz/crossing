<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>crossing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────────────── */
    #sidebar {
      width: 200px;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      background: #111;
      border-right: 1px solid #333;
    }

    #sidebar-controls {
      display: flex;
      gap: 6px;
      padding: 10px;
      border-bottom: 1px solid #333;
    }

    #sidebar-controls button {
      flex: 1;
      padding: 7px 4px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #2a2a2a;
      color: #e0e0e0;
      transition: background 0.15s;
    }
    #sidebar-controls button:hover { background: #3a3a3a; }
    #btn-random  { border-left: 3px solid #6a9fb5 !important; }
    #btn-manual  { border-left: 3px solid #9b7fc4 !important; }
    #btn-import  { border-left: 3px solid #c49b3f !important; }

    #chimera-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
    }

    #chimera-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
      border-bottom: 1px solid #1e1e1e;
      transition: background 0.1s;
    }
    #chimera-list li:hover { background: #1e1e1e; }
    #chimera-list li.active { background: #252525; border-left: 3px solid #6a9fb5; }

    .thumb-wrap {
      width: 48px;
      height: 48px;
      min-width: 48px;
      overflow: hidden;
      background: #222;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thumb-wrap svg {
      width: 100% !important;
      height: 100% !important;
    }

    .chimera-name {
      font-size: 12px;
      word-break: break-all;
      line-height: 1.3;
    }

    /* ── Stage ────────────────────────────────────────────── */
    #stage {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 16px;
      overflow: hidden;
    }

    #stage-svg {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #stage-svg svg {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
    }

    #stage-empty {
      color: #555;
      font-size: 14px;
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #stage-actions {
      display: flex;
      gap: 10px;
    }
    #stage-actions button {
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-delete   { background: #7a2020; color: #ffd0d0; }
    #btn-delete:hover { background: #9a2525; }
    #btn-download { background: #1e4d2b; color: #c0ffd0; }
    #btn-download:hover { background: #265c35; }
    #btn-edit     { background: #2a3a5a; color: #c0d8ff; }
    #btn-edit:hover { background: #334870; }

    /* ── Modal ────────────────────────────────────────────── */
    dialog {
      background: #1c1c1c;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 0;
      width: min(90vw, 780px);
      max-height: 85vh;
      color: #e0e0e0;
      overflow: hidden;
    }
    dialog[open] {
      display: flex;
      flex-direction: column;
    }
    dialog::backdrop { background: rgba(0,0,0,0.7); }

    #modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #333;
      font-size: 15px;
      font-weight: 700;
    }

    #modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .layer-section label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 6px;
    }

    .layer-strip {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .layer-strip::-webkit-scrollbar { height: 4px; }
    .layer-strip::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

    .piece-option {
      min-width: 72px;
      width: 72px;
      height: 72px;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      background: #2a2a2a;
      flex-shrink: 0;
      transition: border-color 0.1s;
    }
    .piece-option img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .piece-option.selected { border-color: #6a9fb5; }
    .piece-option:hover:not(.selected) { border-color: #555; }

    #modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px 18px;
      border-top: 1px solid #333;
    }
    #modal-footer button {
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #btn-compose { background: #6a9fb5; color: #000; }
    #btn-compose:hover { background: #7fb5cc; }
    #btn-cancel  { background: #333; color: #e0e0e0; }
    #btn-cancel:hover { background: #444; }
  </style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────── -->
<aside id="sidebar">
  <div id="sidebar-controls">
    <button id="btn-random">Random</button>
    <button id="btn-manual">Manual</button>
    <button id="btn-import">Import</button>
  </div>
  <input type="file" id="file-input" webkitdirectory accept=".png" style="display:none" multiple />
  <ul id="chimera-list"></ul>
</aside>

<!-- ── Stage ──────────────────────────────────────────── -->
<!-- TODO Different message if Chieras are there or not -->
<main id="stage">
  <div id="stage-svg"></div>
  <p id="stage-empty">No chimeras yet.<br>Create one with the buttons on the left.</p>
  <div id="stage-actions" style="display:none">
    <button id="btn-delete">Delete</button>
    <button id="btn-download">Download SVG</button>
    <button id="btn-edit">Edit</button>
  </div>
</main>

<!-- ── Modal ──────────────────────────────────────────── -->
<dialog id="modal">
  <div id="modal-header">
    <span id="modal-title">Select pieces</span>
  </div>
  <div id="modal-body"></div>
  <div id="modal-footer">
    <button id="btn-cancel">Cancel</button>
    <button id="btn-compose">Compose</button>
  </div>
</dialog>

<script>
const LAYER_LABELS = {
  head: "Head", body: "Body", tail: "Tail",
  legfront: "Front legs", legback: "Back legs", wing: "Wing"
};

const state = {
  chimeras: [],        // ChimeraListItem[]
  selected: null,      // full Chimera | null
  layerOptions: {},    // {layer: [filename, ...]}
  modalMode: null,     // "create" | "edit"
  modalSel: {},        // {layer: filename}
  importedFiles: new Set(),  // filenames that came from user import
};

// ── API helpers ──────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  const res = await fetch("/api" + path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Render helpers ───────────────────────────────────────
function renderList() {
  const ul = document.getElementById("chimera-list");
  ul.innerHTML = "";
  for (const c of state.chimeras) {
    const li = document.createElement("li");
    li.dataset.id = c.id;
    if (state.selected && state.selected.id === c.id) li.classList.add("active");

    const thumb = document.createElement("div");
    thumb.className = "thumb-wrap";
    thumb.innerHTML = c.svg;

    const nameEl = document.createElement("span");
    nameEl.className = "chimera-name";
    nameEl.textContent = c.name;

    // Double-click to rename
    nameEl.addEventListener("dblclick", e => {
      e.stopPropagation();
      startRename(c.id, nameEl);
    });

    li.appendChild(thumb);
    li.appendChild(nameEl);
    li.addEventListener("click", () => selectChimera(c.id));
    ul.appendChild(li);
  }
}

function renderStage() {
  const stageDiv = document.getElementById("stage-svg");
  const actions  = document.getElementById("stage-actions");
  const empty    = document.getElementById("stage-empty");

  if (!state.selected) {
    stageDiv.innerHTML = "";
    empty.style.display = "";
    actions.style.display = "none";
    return;
  }
  empty.style.display = "none";
  stageDiv.innerHTML = state.selected.svg;
  actions.style.display = "flex";
}

// ── Select chimera ───────────────────────────────────────
async function selectChimera(id) {
  state.selected = await api("GET", `/chimeras/${id}`);
  renderStage();
  renderList(); // update active highlight
}

// ── Rename (inline) ──────────────────────────────────────
function startRename(id, nameEl) {
  const original = nameEl.textContent;
  const input = document.createElement("input");
  input.value = original;
  input.style.cssText = "width:100%;font-size:12px;background:#333;color:#e0e0e0;border:1px solid #6a9fb5;border-radius:3px;padding:2px 4px;";
  nameEl.replaceWith(input);
  input.focus();
  input.select();

  async function commit() {
    const newName = input.value.trim() || original;
    if (newName !== original) {
      const updated = await api("PATCH", `/chimeras/${id}/name`, { name: newName });
      const idx = state.chimeras.findIndex(c => c.id === id);
      if (idx !== -1) state.chimeras[idx].name = updated.name;
      if (state.selected && state.selected.id === id) state.selected.name = updated.name;
    }
    renderList();
  }
  input.addEventListener("blur", commit);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") input.blur();
    if (e.key === "Escape") { input.value = original; input.blur(); }
  });
}

// ── Delete ───────────────────────────────────────────────
document.getElementById("btn-delete").addEventListener("click", async () => {
  if (!state.selected) return;
  if (!confirm(`Delete "${state.selected.name}"?`)) return;
  await api("DELETE", `/chimeras/${state.selected.id}`);
  state.chimeras = state.chimeras.filter(c => c.id !== state.selected.id);
  state.selected = null;
  renderList();
  renderStage();
});

// ── Download ─────────────────────────────────────────────
document.getElementById("btn-download").addEventListener("click", () => {
  if (!state.selected) return;
  const blob = new Blob([state.selected.svg], { type: "image/svg+xml" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `${state.selected.name}.svg`;
  a.click();
  URL.revokeObjectURL(url);
});

// ── Modal ────────────────────────────────────────────────
function openModal(mode) {
  state.modalMode = mode;
  document.getElementById("modal-title").textContent =
    mode === "create" ? "Create chimera manually" : `Edit ${state.selected.name}`;

  if (mode === "edit" && state.selected) {
    state.modalSel = { ...state.selected.pieces };
  } else {
    // Default: first available option per layer
    state.modalSel = {};
    for (const layer of Object.keys(state.layerOptions)) {
      state.modalSel[layer] = state.layerOptions[layer][0];
    }
  }

  buildModalBody();
  document.getElementById("modal").showModal();
}

function buildModalBody() {
  const body = document.getElementById("modal-body");
  body.innerHTML = "";

  for (const [layer, files] of Object.entries(state.layerOptions)) {
    const section = document.createElement("div");
    section.className = "layer-section";

    const label = document.createElement("label");
    label.textContent = LAYER_LABELS[layer] || layer;
    section.appendChild(label);

    const strip = document.createElement("div");
    strip.className = "layer-strip";

    for (const file of files) {
      const div = document.createElement("div");
      div.className = "piece-option" + (state.modalSel[layer] === file ? " selected" : "");
      div.dataset.layer = layer;
      div.dataset.file  = file;

      const img = document.createElement("img");
      img.src = state.importedFiles.has(file)
        ? `/api/imported-preview/${layer}/${encodeURIComponent(file)}`
        : `/assets/${layer}/${file}`;
      img.alt = file;
      div.appendChild(img);

      div.addEventListener("click", () => {
        state.modalSel[layer] = file;
        strip.querySelectorAll(".piece-option").forEach(el => el.classList.remove("selected"));
        div.classList.add("selected");
      });

      strip.appendChild(div);
    }

    section.appendChild(strip);
    body.appendChild(section);
  }
}

document.getElementById("btn-cancel").addEventListener("click", () => {
  document.getElementById("modal").close();
});

document.getElementById("btn-compose").addEventListener("click", async () => {
  document.getElementById("modal").close();

  if (state.modalMode === "create") {
    const chimera = await api("POST", "/chimeras/manual", { pieces: state.modalSel });
    state.chimeras.push({ id: chimera.id, number: chimera.number, name: chimera.name, svg: chimera.svg });
    state.selected = chimera;
  } else {
    const chimera = await api("PATCH", `/chimeras/${state.selected.id}/pieces`, { pieces: state.modalSel });
    const idx = state.chimeras.findIndex(c => c.id === chimera.id);
    if (idx !== -1) state.chimeras[idx].svg = chimera.svg;
    state.selected = chimera;
  }

  renderList();
  renderStage();
});

// ── Toolbar buttons ──────────────────────────────────────
document.getElementById("btn-random").addEventListener("click", async () => {
  const chimera = await api("POST", "/chimeras/random");
  state.chimeras.push({ id: chimera.id, number: chimera.number, name: chimera.name, svg: chimera.svg });
  state.selected = chimera;
  renderList();
  renderStage();
});

document.getElementById("btn-manual").addEventListener("click", () => {
  openModal("create");
});

document.getElementById("btn-edit").addEventListener("click", () => {
  if (!state.selected) return;
  openModal("edit");
});

// ── Import pieces ────────────────────────────────────────
document.getElementById("btn-import").addEventListener("click", () => {
  document.getElementById("file-input").click();
});

document.getElementById("file-input").addEventListener("change", async (e) => {
  const files = [...e.target.files].filter(f => f.name.toLowerCase().endsWith(".png"));
  if (files.length === 0) return;

  const form = new FormData();
  for (const f of files) form.append("files", f, f.name);

  const res = await fetch("/api/import-pieces", { method: "POST", body: form });
  if (!res.ok) { console.error("Import failed", await res.text()); return; }

  const imported = await res.json(); // {layer: [filename, ...]}
  for (const fnames of Object.values(imported)) {
    for (const fname of fnames) state.importedFiles.add(fname);
  }

  // Merge imported filenames into layerOptions and refresh layers from server
  state.layerOptions = await api("GET", "/layers");

  // Reset file input so the same folder can be re-selected
  e.target.value = "";
});

// ── Boot ─────────────────────────────────────────────────
async function init() {
  const [layers, chimeras] = await Promise.all([
    api("GET", "/layers"),
    api("GET", "/chimeras"),
  ]);
  state.layerOptions = layers;
  state.chimeras = chimeras;
  renderList();

  if (chimeras.length > 0) {
    await selectChimera(chimeras[0].id);
  } else {
    renderStage();
  }
}

init();
</script>
</body>
</html>
